# ============================================================
# Prometheus Configuration
# Phase 4 | Executed: Local (prometheus Docker container)
#
# Scrapes metrics from:
#   1. FastAPI backend (/metrics endpoint)
#   2. Airflow webserver (built-in metrics endpoint)
# ============================================================

global:
  scrape_interval: 15s        # scrape every 15 seconds
  evaluation_interval: 15s

scrape_configs:

  # ── FastAPI backend ─────────────────────────────────────────────────────
  - job_name: "melanoma_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  # ── Airflow webserver ───────────────────────────────────────────────────
  # Airflow exposes Prometheus metrics at /admin/metrics
  # Requires AIRFLOW__METRICS__STATSD_ON=false and metrics enabled in config
  - job_name: "airflow"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /admin/metrics

  # ── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
