# ============================================================
# docker-compose-airflow.yml
# Phase 1 & 2 | Executed: Local (Windows 11)
#
# Spins up Apache Airflow with custom image that includes
# ML dependencies (torch, mlflow, scikit-learn etc.)
# pre-baked — fast restarts, no pip install on every start.
#
# Usage:
#   docker compose -f airflow/docker-compose-airflow.yml build
#   docker compose -f airflow/docker-compose-airflow.yml up airflow-init
#   docker compose -f airflow/docker-compose-airflow.yml up airflow-webserver airflow-scheduler
#   Open: http://localhost:8080
#   Default login: admin / admin
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__WEBSERVER__SECRET_KEY: "melanoma_mlops_secret_key_change_in_prod"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__METRICS__STATSD_ON: "false"
    AIRFLOW__METRICS__PROMETHEUS_ON: "true"
    AIRFLOW__METRICS__PROMETHEUS_PORT: 8793
    PYTHONPATH: /opt/airflow/scripts

  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./configs:/opt/airflow/configs
    - airflow-db:/opt/airflow
    - airflow-logs:/opt/airflow/logs
    - ../data:/opt/airflow/data
    - ../logs:/opt/airflow/app_logs
    - ../training:/opt/airflow/training
    - ../mlruns:/opt/airflow/mlruns
services:

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Melanoma \
          --lastname MLOps \
          --role Admin \
          --email admin@melanoma.local || true
        echo "Airflow initialized"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
      - "8793:8793"
    depends_on:
      - airflow-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      - airflow-init
    restart: unless-stopped

volumes:
  airflow-db:
  airflow-logs:

networks:
  default:
    external: true
    name: mlops_network