# ============================================================
# docker-compose-airflow.yml
# Phase 1 & 2 | Executed: Local (Windows 11)
#
# Spins up Apache Airflow (standalone mode) locally.
# Mounts your local project scripts, dags, configs, data,
# logs and training folders into the container.
#
# Usage:
#   docker-compose -f airflow/docker-compose-airflow.yml up
#   Open: http://localhost:8080
#   Default login: admin / admin
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__WEBSERVER__SECRET_KEY: "melanoma_mlops_secret_key_change_in_prod"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow/scripts

  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./configs:/opt/airflow/configs
    - airflow-db:/opt/airflow
    - airflow-logs:/opt/airflow/logs
    - ../data:/opt/airflow/data
    - ../logs:/opt/airflow/app_logs
    - ../training:/opt/airflow/training

services:

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --user pyyaml scikit-learn pillow pandas --quiet
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Melanoma \
          --lastname MLOps \
          --role Admin \
          --email admin@melanoma.local || true
        echo "Airflow initialized"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --user pyyaml scikit-learn pillow pandas --quiet &&
        airflow webserver
      "
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --user pyyaml scikit-learn pillow pandas --quiet &&
        airflow scheduler
      "
    depends_on:
      - airflow-init
    restart: unless-stopped

volumes:
  airflow-db:
  airflow-logs: