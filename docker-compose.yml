# ============================================================
# docker-compose.yml
# Phase 4 | Executed: Local (Windows 11)
#
# Services:
#   frontend   → nginx serving HTML/CSS/JS         (port 80)
#   backend    → FastAPI inference server           (port 8000)
#   mlflow     → MLflow UI (local registry)        (port 5000)
#   prometheus → metrics scraper                    (port 9090)
#   grafana    → NRT dashboard                      (port 3000)
#
# Usage:
#   docker network create mlops_network
#   docker-compose up --build
#   docker-compose down
# ============================================================

services:

  # ── Frontend: nginx static file server ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: melanoma_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend: FastAPI inference server ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: melanoma_backend
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: /mlruns
      MLFLOW_ARTIFACT_ROOT: /mlruns
      BASELINE_STATS_PATH: /app/data/baseline_stats/v1_stats.json
    volumes:
      - ./mlruns:/mlruns
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MLflow UI: visualize experiments and model registry ─────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    container_name: melanoma_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow ui
      --backend-store-uri /mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

  # ── Prometheus: metrics scraper ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: melanoma_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Grafana: NRT dashboard ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: melanoma_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  default:
    external: true
    name: mlops_network