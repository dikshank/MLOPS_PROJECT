# ============================================================
# python_env.yaml
# Python environment specification for MLflow Projects.
#
# Ensures identical environment for every training run.
# Used by MLproject to guarantee reproducibility.
#
# Actual versions verified on: Windows 11, Python 3.14.3
# Hardware: Intel UHD 620 (CPU only, no CUDA)
#
# Note: These are local training dependencies.
#       Backend serving uses requirements.txt (Python 3.10 Docker)
# ============================================================

python: "3.14"

build_dependencies:
  - pip

dependencies:
  # ── Core ML ──────────────────────────────────────────────────────────
  - torch==2.11.0
  - torchvision==0.26.0

  # ── Experiment tracking ───────────────────────────────────────────────
  - mlflow==3.11.1

  # ── Data processing ───────────────────────────────────────────────────
  - pillow==12.2.0
  - pandas==2.3.3
  - numpy
  - scikit-learn==1.8.0

  # ── Config and utilities ──────────────────────────────────────────────
  - pyyaml==6.0.3
  - tqdm

  # ── Serving dependencies (for local testing outside Docker) ───────────
  - fastapi
  - uvicorn
  - prometheus-client
  - python-multipart
  - httpx
  - requests

  